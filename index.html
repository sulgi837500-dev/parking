<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Parking</title>
    
    <meta name="application-name" content="Smart Parking">
    <meta name="apple-mobile-web-app-title" content="Smart Parking">
    <meta name="theme-color" content="#121212"> <link rel="apple-touch-icon" href="https://github.com/KOSMOS-Inc/kosmos-images/blob/main/parking_icon_for_pwa.png?raw=true">

    <link rel="icon" type="image/png" sizes="192x192" href="https://github.com/KOSMOS-Inc/kosmos-images/blob/main/parking_icon_for_pwa.png?raw=true">
    <link rel="icon" type="image/png" sizes="512x512" href="https://github.com/KOSMOS-Inc/kosmos-images/blob/main/parking_icon_for_pwa.png?raw=true">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <style>
        :root {
            --primary: #007AFF;
            --bg: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-sub: #a0a0a0;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg); 
            color: var(--text-main);
            display: flex; flex-direction: column; align-items: center; 
            padding: 20px; margin: 0; min-height: 100vh;
        }

        /* 현황판 카드 */
        .card { 
            width: 100%; max-width: 400px; 
            background: var(--card-bg); 
            border-radius: 24px; padding: 24px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            margin-bottom: 30px;
            box-sizing: border-box;
        }

        h2 { font-size: 1.1rem; margin-top: 0; color: var(--text-sub); letter-spacing: -0.5px; margin-bottom: 20px; text-align: center; }

        .car-status { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 16px; background: rgba(255,255,255,0.05); 
            border-radius: 16px; margin-bottom: 12px;
        }

        .car-info { display: flex; align-items: center; gap: 12px; }
        
        /* 로고 스타일: 선명도 및 크기 최적화 */
        .brand-logo { 
            width: 32px; height: 32px; 
            object-fit: contain; 
            image-rendering: -webkit-optimize-contrast;
        }
        
        .car-name { font-weight: 600; font-size: 1.05rem; }

        .spot-display { text-align: right; }
        .spot-info { color: var(--primary); font-weight: 700; font-size: 1.1rem; display: block; }
        .time-info { font-size: 0.75rem; color: var(--text-sub); margin-top: 4px; display: block; }

        /* 선택 영역 */
        .selection-area { width: 100%; max-width: 400px; flex-grow: 1; }
        .section-title { font-size: 0.9rem; font-weight: 600; color: var(--text-sub); margin-bottom: 15px; margin-left: 5px; }

        .car-selector { display: flex; gap: 12px; margin-bottom: 25px; }
        .car-btn { 
            flex: 1; padding: 20px 16px; border: 2px solid transparent; 
            border-radius: 18px; background: var(--card-bg); color: var(--text-sub);
            font-weight: 700; cursor: pointer; display: flex; flex-direction: column; 
            align-items: center; gap: 10px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            -webkit-tap-highlight-color: transparent;
        }
        .car-btn.active { 
            border-color: var(--primary); background: rgba(0, 122, 255, 0.1); color: var(--text-main);
            transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 122, 255, 0.3);
        }
        /* 버튼 내 로고는 약간 더 크게 */
        .car-btn .brand-logo { width: 40px; height: 40px; }

        .button-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .spot-btn { 
            padding: 22px 10px; font-size: 1.05rem; font-weight: 600; border: none; 
            border-radius: 18px; background-color: #2c2c2e; color: white; 
            cursor: pointer; transition: all 0.2s; -webkit-tap-highlight-color: transparent;
        }
        .spot-btn:active { background-color: var(--primary); transform: scale(0.92); }

        .footer { padding: 30px 0 10px; font-size: 0.75rem; color: #444; text-align: center; width: 100%; }
    </style>
</head>
<body>

<div class="card">
    <h2>LAST PARKING</h2>
    <div class="car-status">
        <div class="car-info">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/33/Mercedes-Benz_star_logo.svg/2048px-Mercedes-Benz_star_logo.svg.png" alt="Benz" class="brand-logo">
            <span class="car-name">벤츠</span>
        </div>
        <div class="spot-display">
            <span id="status-benz" class="spot-info" style="color: #666;">미등록</span>
            <span id="time-benz" class="time-info">-</span>
        </div>
    </div>
    <div class="car-status">
        <div class="car-info">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/13/Kia_Motors_logo_%282021%29.svg/2560px-Kia_Motors_logo_%282021%29.svg.png" alt="Kia" class="brand-logo">
            <span class="car-name">쏘렌토</span>
        </div>
        <div class="spot-display">
            <span id="status-sorento" class="spot-info" style="color: #666;">미등록</span>
            <span id="time-sorento" class="time-info">-</span>
        </div>
    </div>
</div>

<div class="selection-area">
    <div class="section-title">차량 선택</div>
    <div class="car-selector">
        <button id="btn-benz" class="car-btn active" onclick="selectCar('benz')">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/33/Mercedes-Benz_star_logo.svg/2048px-Mercedes-Benz_star_logo.svg.png" alt="Benz" class="brand-logo">
            BENZ
        </button>
        <button id="btn-sorento" class="car-btn" onclick="selectCar('sorento')">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/13/Kia_Motors_logo_%282021%29.svg/2560px-Kia_Motors_logo_%282021%29.svg.png" alt="Kia" class="brand-logo">
            SORENTO
        </button>
    </div>

    <div class="section-title">위치 기록</div>
    <div class="button-grid">
        <button class="spot-btn" onclick="saveSpot('B2-분리수거')">B2 분리수거</button>
        <button class="spot-btn" onclick="saveSpot('B2-정문쪽')">B2 정문</button>
        <button class="spot-btn" onclick="saveSpot('지하 3층')">B3층</button>
        <button class="spot-btn" onclick="saveSpot('지하 4층')">B4층</button>
    </div>
</div>

<div class="footer">Smart Parking System v3.0</div>

<script>
    let currentCar = 'benz';

    window.onload = function() {
        loadData('benz');
        loadData('sorento');
    }

    function selectCar(car) {
        currentCar = car;
        document.getElementById('btn-benz').classList.remove('active');
        document.getElementById('btn-sorento').classList.remove('active');
        document.getElementById('btn-' + car).classList.add('active');
        
        // 차량 선택 시 가벼운 진동
        if (navigator.vibrate) navigator.vibrate(30);
    }

    function loadData(car) {
        const spot = localStorage.getItem('parking_spot_' + car);
        const time = localStorage.getItem('parking_time_' + car);
        const statusEl = document.getElementById('status-' + car);
        const timeEl = document.getElementById('time-' + car);

        if (spot) {
            statusEl.innerText = spot;
            statusEl.style.color = "var(--primary)"; // 기록이 있으면 파란색
            timeEl.innerText = time;
        } else {
            statusEl.innerText = "미등록";
            statusEl.style.color = "#666"; // 기록이 없으면 회색
            timeEl.innerText = "-";
        }
    }

    function saveSpot(spotName) {
        const now = new Date();
        // 날짜 형식 포맷팅 (예: 3/28 14:05)
        const timeStr = (now.getMonth() + 1) + "/" + now.getDate() + " " + now.getHours() + ":" + now.getMinutes().toString().padStart(2, '0');
        
        localStorage.setItem('parking_spot_' + currentCar, spotName);
        localStorage.setItem('parking_time_' + currentCar, timeStr);

        // 해당 차량 데이터만 갱신
        loadData(currentCar);

        // 저장 완료 진동 (띠띧)
        if (navigator.vibrate) navigator.vibrate([50, 30, 50]);
    }
</script>

</body>
</html>
